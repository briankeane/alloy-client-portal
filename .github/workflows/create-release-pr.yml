name: Create Release PR (develop → main)

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version increment type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
      release_title:
        description: "Release title (e.g., 'Auth Overhaul')"
        required: true
        type: string

jobs:
  create-release-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: develop

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Get current version
        id: current_version
        run: |
          CURRENT_VERSION=$(node -p "require('./server/package.json').version")
          echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $CURRENT_VERSION"

      - name: Calculate new version
        id: new_version
        run: |
          CURRENT="${{ steps.current_version.outputs.version }}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case "${{ inputs.version_bump }}" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION"

      - name: Update version in package.json
        run: |
          NEW_VERSION="${{ steps.new_version.outputs.version }}"

          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('./server/package.json', 'utf8'));
            pkg.version = '$NEW_VERSION';
            fs.writeFileSync('./server/package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

          echo "Updated server/package.json to version $NEW_VERSION"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add server/package.json
          git commit -m "chore: bump version to ${{ steps.new_version.outputs.version }}"
          git push origin develop

      - name: Generate PR summary from commits
        id: pr_summary
        run: |
          COMMITS=$(git log origin/main..develop --pretty=format:"- %s" --no-merges | head -50)

          {
            echo "commits<<EOF"
            echo "$COMMITS"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_VERSION: ${{ steps.new_version.outputs.version }}
          CURRENT_VERSION: ${{ steps.current_version.outputs.version }}
          RELEASE_TITLE: ${{ inputs.release_title }}
          COMMITS: ${{ steps.pr_summary.outputs.commits }}
          BUMP_TYPE: ${{ inputs.version_bump }}
        run: |
          PR_TITLE="${NEW_VERSION} - ${RELEASE_TITLE}"

          PR_BODY="## Release ${NEW_VERSION}

          ### Changes
          ${COMMITS}

          ### Version Bump
          - **Previous version:** ${CURRENT_VERSION}
          - **New version:** ${NEW_VERSION}
          - **Bump type:** ${BUMP_TYPE}

          ---
          *This PR was automatically generated by the release workflow.*"

          gh pr create \
            --base main \
            --head develop \
            --title "$PR_TITLE" \
            --body "$PR_BODY"
