paths:
  /v1/users/me:
    get:
      tags:
        - Users
      summary: Get current user
      description: Returns the authenticated user's profile.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/UserJwtRepr'
        '401':
          description: Authentication required

  /v1/users/{userId}:
    get:
      tags:
        - Users
      summary: Get user by ID
      description: Returns a user by ID. Accessible by the user themselves or an admin.
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/UserJwtRepr'
        '400':
          description: Invalid UUID format
        '401':
          description: Authentication required
        '403':
          description: Forbidden — not self or admin
        '404':
          description: User not found

    put:
      tags:
        - Users
      summary: Update user
      description: Update a user's profile. Accessible by the user themselves or an admin.
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                firstName:
                  type: string
                  example: Jane
                lastName:
                  type: string
                  example: Doe
                displayName:
                  type: string
                  example: Jane Doe
                profileImageUrl:
                  type: string
                  example: https://example.com/photo.jpg
      responses:
        '200':
          description: User updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/UserJwtRepr'
        '400':
          description: Invalid UUID or no updatable fields provided
        '401':
          description: Authentication required
        '403':
          description: Forbidden — not self or admin
        '404':
          description: User not found
